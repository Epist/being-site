<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>belove</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Gloria+Hallelujah&display=swap" rel="stylesheet">
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    <link rel="manifest" href="/site.webmanifest">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
        }

        body {
            font-family: 'Gloria Hallelujah', cursive;
            background: linear-gradient(135deg, #EDAE49 0%, #003D5B 50%, #D1495B 100%);
            color: #f5f5f5;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* Subtle animated gradient orb */
        body::before {
            content: '';
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(99, 102, 241, 0.08) 0%, transparent 70%);
            border-radius: 50%;
            animation: breathe 8s ease-in-out infinite;
            pointer-events: none;
            z-index: 0;
        }

        /* Centered background flower image */
        body::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100%;
            height: 100%;
            background-image: url('flower-heartflower.png');
            background-size: contain;
            background-position: center;
            background-repeat: no-repeat;
            opacity: 0.10;
            pointer-events: none;
            z-index: 0;
        }

        @keyframes breathe {
            0%, 100% {
                transform: scale(1);
                opacity: 0.5;
            }
            50% {
                transform: scale(1.15);
                opacity: 0.8;
            }
        }

        .container {
            text-align: center;
            z-index: 1;
            padding: 2rem;
        }

        .logo {
            font-size: clamp(4.5rem, 12vw, 8rem);
            font-weight: 300;
            letter-spacing: 0.2em;
            text-transform: lowercase;
            margin-bottom: .25rem;
            animation: fadeIn 2s ease-out;
        }

        .logo .be {
            background: linear-gradient(180deg, #a0a0a0 0%, #30638E 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .logo .love {
            background: linear-gradient(180deg, #a0a0a0 0%, #D1495B 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .tagline {
            font-size: clamp(1.2rem, 3vw, 1.8rem);
            font-weight: 300;
            font-style: italic;
            letter-spacing: 0.15em;
            color: rgba(255, 255, 255, 0.75);
            margin-bottom: 1rem;
            animation: fadeIn 2s ease-out 0.5s both;
        }

        .subtitle {
            font-size: clamp(0.85rem, 2vw, 1rem);
            font-weight: 400;
            letter-spacing: 0.35em;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.4);
            animation: fadeIn 2s ease-out 1s both;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Subtle decorative line */
        /*.divider {
            width: 60px;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            margin: 2rem auto;
            animation: fadeIn 2s ease-out 0.75s both;
        } */

        /* Optional: very subtle noise texture */
        .noise {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            opacity: 0.03;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
        }
    </style>
</head>
<body>
    <div class="noise"></div>
    <div class="container">
        <h1 class="logo"><span class="be">be</span><span class="love">love</span></h1>
        <p class="tagline">your digital life organized<br>by you, for you</p>
        <div class="divider"></div>
                <form id="waitlist" class="subtitle" style="margin-top:0.5rem; display: flex; justify-content: center; align-items: center; gap: 0.5em;">
                    <input type="email" name="email" required placeholder="email" style="font-family: inherit; font-size: 1em; padding: 0.4em 0.8em; border: none; border-radius: 2em; background: rgba(255,255,255,0.12); color: #fff; outline: none; letter-spacing: 0.1em; min-width: 210px; max-width: 270px; box-shadow: 0 1px 4px 0 rgba(0,0,0,0.03); text-align: center;">
                    <button type="submit" style="font-family: inherit; font-size: 1.3em; background: none; border: none; color: #fff; cursor: pointer; padding: 0 0.5em; border-radius: 50%; transition: background 0.2s; line-height: 1;">→</button>
                </form>
                <script>
                    document.getElementById('waitlist').addEventListener('submit', async (e) => {
                        e.preventDefault();
                        const email = e.target.email.value;
                        try {
                            await fetch('https://script.google.com/macros/s/AKfycbwgvQZokvo5vzS4Ngs2PmpyJjQYX3zdo_BwuErL0ehHaKFgydop0AwDJTU4ALrawFwhfw/exec', {
                                method: 'POST',
                                body: JSON.stringify({ email })
                            });
                            e.target.outerHTML = "<p class=\"subtitle\">We'll be in touch.</p>";
                        } catch {
                            e.target.outerHTML = "<p class=\"subtitle\">Something went wrong. Try again in a moment.</p>";
                        }
                    });
                </script>
    </div>
</body>
</html>
